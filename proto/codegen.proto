/*
 * Copied from https://github.com/sqlc-dev/sqlc/blob/6b2ed2024ccd66eea7eb7d97cb36338a7fb46f3d/protos/plugin/codegen.proto
 */
syntax = "proto3";

package plugin;

service CodegenService {
  rpc Generate (GenerateRequest) returns (GenerateResponse);
}

message File {
  string name = 1 [json_name = "name"];
  bytes contents = 2 [json_name = "contents"];
}

message Settings {
  // Rename message was field 5
  // Overides message was field 6
  // PythonCode message was field 8
  // KotlinCode message was field 9
  // GoCode message was field 10;
  // JSONCode message was field 11;
  reserved 5, 8, 9, 10, 11;

  string version = 1 [json_name = "version"];
  string engine = 2 [json_name = "engine"];
  repeated string schema = 3 [json_name = "schema"];
  repeated string queries = 4 [json_name = "queries"];
  Codegen codegen = 12 [json_name = "codegen"];
}

message Codegen {
  message Process {
    string cmd = 1;
  }
  message WASM {
    string url = 1;
    string sha256 = 2;
  }
  string out = 1 [json_name = "out"];
  string plugin = 2 [json_name = "plugin"];
  bytes options = 3 [json_name = "options"];
  repeated string env = 4 [json_name = "env"];
  Process process = 5 [json_name = "process"];
  WASM wasm = 6 [json_name = "wasm"];
}

message Catalog {
  string comment = 1;
  string default_schema = 2;
  string name = 3;
  repeated Schema schemas = 4;
}

message Schema {
  string comment = 1;
  string name = 2;
  repeated Table tables = 3;
  repeated Enum enums = 4;
  repeated CompositeType composite_types = 5;
  // User-defined domain types in this schema (CREATE DOMAIN ... AS ...).
  repeated Domain domains = 6;
}

message CompositeType {
  string name = 1;
  string comment = 2;
}

// A user-defined domain type (CREATE DOMAIN name AS base_type CHECK (...)).
// Domains are thin wrappers over a base type with optional constraints.
// Norm generates a @JvmInline value class for each domain referenced by a query column.
message Domain {
  // The unqualified domain name as it appears in pg_type.typname (e.g. "email").
  string name = 1;
  // The Postgres base type name (e.g. "text", "int4"). Sourced from the base type's pg_type.typname.
  string base_type = 2;
  // Optional comment set via COMMENT ON DOMAIN. Empty string when absent.
  string comment = 3;
}

message Enum {
  string name = 1;
  repeated string vals = 2;
  string comment = 3;
}

message Table {
  Identifier rel = 1;
  repeated Column columns = 2;
  string comment = 3;
  // True for VIEWs and MATERIALIZED VIEWs.
  bool is_view = 4;
}

message Identifier {
  string catalog = 1;
  string schema = 2;
  string name = 3;
}

message Column {
  string name = 1;
  bool not_null = 3;
  bool is_array = 4;
  string comment = 5;
  int32 length = 6;
  bool is_named_param = 7;
  bool is_func_call = 8;

  // XXX: Figure out what PostgreSQL calls `foo.id`
  string scope = 9;
  Identifier table = 10;
  string table_alias = 11;
  Identifier type = 12;
  bool is_sqlc_slice = 13;
  Identifier embed_table = 14;
  string original_name = 15;
  bool unsigned = 16;
  int32 array_dims = 17;
  bool is_primary_key = 18;
  // True when JDBC reports IS_AUTOINCREMENT = "YES" (e.g. SERIAL, IDENTITY columns).
  bool is_auto_increment = 19;
  // True when the column has a server-side DEFAULT expression (COLUMN_DEF is non-empty).
  bool has_default = 20;
  // True when JDBC reports IS_GENERATEDCOLUMN = "YES" (GENERATED ALWAYS AS ... STORED).
  bool is_generated = 21;
}

message Query {
  string text = 1 [json_name = "text"];
  string name = 2 [json_name = "name"];
  string cmd = 3 [json_name = "cmd"];
  repeated Column columns = 4 [json_name = "columns"];
  repeated Parameter params = 5 [json_name = "parameters"];
  repeated string comments = 6 [json_name = "comments"];
  string filename = 7 [json_name = "filename"];
  Identifier insert_into_table = 8 [json_name = "insert_into_table"];
  // True when this query was synthesized by CrudQuerySynthesizer.synthesizeInsert.
  // Used to gate batch-with-returning code generation.
  bool is_synthesized_insert = 9 [json_name = "is_synthesized_insert"];

  // Maps each 1-based JDBC parameter position to the named parameter that produced it.
  //
  // Populated when the SQL query uses `:paramName` syntax (see QueryFileParser). Each
  // occurrence of a named parameter gets its own `?` placeholder and its own entry here.
  // When the same name appears at multiple positions (e.g., `:scannedAt` used twice),
  // those positions map to the same name — this is how SqlStatement detects reuse and
  // collapses them into a single function parameter.
  //
  // Empty for queries using positional `?` parameters or synthesized CRUD queries.
  map<int32, string> named_parameters = 10 [json_name = "named_parameters"];
}

message Parameter {
  int32 number = 1 [json_name = "number"];
  Column column = 2 [json_name = "column"];
}

message GenerateRequest {
  Settings settings = 1 [json_name = "settings"];
  Catalog catalog = 2 [json_name = "catalog"];
  repeated Query queries = 3 [json_name = "queries"];
  string sqlc_version = 4 [json_name = "sqlc_version"];
  bytes plugin_options = 5 [json_name = "plugin_options"];
  bytes global_options = 6 [json_name = "global_options"];
}

message GenerateResponse {
  repeated File files = 1 [json_name = "files"];
}
