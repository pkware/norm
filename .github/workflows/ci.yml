# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Build & test

on:
  pull_request:
  push:
    branches: [ main, release/* ]

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Build Norm
      uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0
      with:
        arguments: build

    - name: Build Example
      uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0
      with:
        arguments: build
        build-root-directory: example
        execution-only-caches: true # See https://github.com/burrunan/gradle-cache-action/issues/15

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6.1.0
      if: success() || failure() # always run even if the previous step fails
      with:
        report_paths: '**/test-results/**/TEST-*.xml'
